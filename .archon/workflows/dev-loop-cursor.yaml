name: dev-loop-cursor
description: |
  Governed TDD → implement → refactor → PR pipeline.
  Uses Cursor CLI inside bash nodes (works with stock Archon v0.5.0).
  After building archon-cursor, you may set provider: cursor for AI nodes.
provider: codex
interactive: false

nodes:
  - id: gate-pre
    bash: ./.archon/bin/verify-gate.sh pre "$ARGUMENTS"
    timeout: 30000

  - id: tdd
    bash: |
      set -euo pipefail
      echo "tdd" > .cursor/workflow-phase
      ./.archon/bin/run-cursor-step.sh tdd "$ARGUMENTS"
    depends_on: [gate-pre]
    timeout: 1800000

  - id: verify-tdd
    bash: ./.archon/bin/verify-gate.sh tdd
    depends_on: [tdd]
    timeout: 120000

  - id: implement
    bash: |
      set -euo pipefail
      echo "implement" > .cursor/workflow-phase
      ./.archon/bin/run-cursor-step.sh implement "$ARGUMENTS"
    depends_on: [verify-tdd]
    timeout: 3600000

  - id: verify-implement
    bash: ./.archon/bin/verify-gate.sh implement
    depends_on: [implement]
    timeout: 120000

  - id: refactor
    bash: |
      set -euo pipefail
      echo "refactor" > .cursor/workflow-phase
      ./.archon/bin/run-cursor-step.sh refactor "$ARGUMENTS"
    depends_on: [verify-implement]
    timeout: 1800000

  - id: verify-refactor
    bash: ./.archon/bin/verify-gate.sh refactor
    depends_on: [refactor]
    timeout: 120000

  - id: open-pr
    bash: |
      set -euo pipefail
      echo "pr" > .cursor/workflow-phase
      ./.archon/bin/run-cursor-step.sh pr "$ARGUMENTS"
    depends_on: [verify-refactor]
    timeout: 900000

  - id: verify-pr
    bash: ./.archon/bin/verify-gate.sh pr
    depends_on: [open-pr]
    timeout: 120000
